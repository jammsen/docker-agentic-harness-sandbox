# Model configuration — single source of truth for every tool in the sandbox.
# Set in a `.env` next to this file (see .env.example) or export before
# `compose up`; every var defaults, so a bare `docker compose up` runs the
# standard dual-model setup: DeepSeek V4 Flash as the text-only brain,
# Qwen3.6 35B as the vision model for image requests.
x-model-env: &model-env
  MODEL_URL: ${MODEL_URL:-http://10.0.0.55:8888/v1}              # OpenAI-compatible API base incl. /v1
  MODEL_ID: ${MODEL_ID:-deepseek-v4-flash-dspark}                # exact model id from GET $MODEL_URL/models
  MODEL_NAME: ${MODEL_NAME:-DeepSeek V4 Flash DSpark}            # display name in tool pickers
  MODEL_CONTEXT: ${MODEL_CONTEXT:-1000000}                       # context window budget for the tools
  MODEL_MAX_TOKENS: ${MODEL_MAX_TOKENS:-16384}                   # max completion tokens
  MODEL_VISION: ${MODEL_VISION:-false}                           # false = primary is text-only; claude-shim reroutes image requests to the vision model
  VISION_MODEL_URL: ${VISION_MODEL_URL:-http://10.0.0.13:8000/v1}
  VISION_MODEL_ID: ${VISION_MODEL_ID:-qwen3.6-35b}
  VISION_MODEL_NAME: ${VISION_MODEL_NAME:-Qwen3.6 35B A3B}
  VISION_MODEL_CONTEXT: ${VISION_MODEL_CONTEXT:-120000}
  VISION_MODEL_MAX_TOKENS: ${VISION_MODEL_MAX_TOKENS:-16384}

services:
  sandbox:
    build:
      context: .
      args:
        PYTHON_VERSION: "3.13"                  # override here to change the Python version
        APT_MIRROR: ${APT_MIRROR:-}             # optional apt mirror for faster builds, see .env.example
    container_name: agentic-harness-sandbox
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      <<: *model-env
      HOME: /home/agent
      SHELL: /bin/bash
      USER: agent
      LANG: C.UTF-8                             # ensures TUI apps (opencode, omp) render Unicode box-drawing chars
      LC_ALL: C.UTF-8
      TOOLS: claude,opencode,omp                # order defines menu order and default (first = default)
      DEFAULT_TOOL: ${DEFAULT_TOOL:-}           # pass-through from host shell; empty = show menu in browser
      CLAUDE_CODE_NO_FLICKER: "1"               # prevents Claude Code from using alt-screen tricks that break scroll in WeTTY
      LITELLM_UPSTREAM: http://agentic-litellm:4000   # upstream for claude-shim.js (Claude image-rewrite proxy on 127.0.0.1:4001)
      UPSTREAM_TIMEOUT_MS: "3600000"                  # claude-shim read timeout to litellm — 60m, matches the whole timeout chain
      SEARXNG_URL: http://searxng:8080               # used by OMP's built-in web search (providers.webSearch=searxng) and mcp-searxng
    init: true                                  # tini as PID 1 — reaps zombie child processes
    restart: unless-stopped                     # auto-restart on failure or host reboot
    read_only: false                            # opencode writes session state
    security_opt:
      - no-new-privileges:true                  # prevent privilege escalation
    cap_drop:
      - ALL                                     # drop all Linux capabilities
    cap_add:
      - CHOWN                                   # entrypoint: chown -R on /home/agent
      - SETUID                                  # gosu + useradd/usermod
      - SETGID                                  # gosu + groupadd/groupmod
      - DAC_OVERRIDE                            # allows root to chown/access files it doesn't own
    ports:
      - "1111:1111/tcp"                         # wetty browser terminal — open https://<host>:1111
      - "1112:1112/tcp"                         # image upload companion — open https://<host>:1112
      - "3000:3000/tcp"                         # agent dev server port (Vite, Express, Django, Flask, etc.)
    volumes:
      # opencode config. opencode.json is a template — the entrypoint renders
      # ${MODEL_*} placeholders into ~/.config/opencode/opencode.json on start.
      - ./config/opencode/opencode.json:/home/agent/.config/templates/opencode.json:ro
      - ./config/opencode/AGENTS.md:/home/agent/.config/opencode/AGENTS.md:ro
      - ./config/opencode/skills:/home/agent/.config/opencode/skills:ro
      - ./config/opencode/commands:/home/agent/.config/opencode/commands:ro
      - ./config/opencode/agents:/home/agent/.config/opencode/agents:ro
      # OMP config. config.yml and models.yml are templates rendered by the
      # entrypoint into ~/.omp/agent/ (rendered copies live in the container
      # layer; setupVersion persists across restarts, resets on recreate).
      - ./config/omp/config.yml:/home/agent/.config/templates/omp-config.yml:ro
      - ./config/omp/models.yml:/home/agent/.config/templates/omp-models.yml:ro
      - ./config/omp/settings.json:/home/agent/.omp/agent/settings.json:rw
      - ./config/omp/AGENTS.md:/home/agent/.omp/agent/AGENTS.md:ro
      - ./config/omp/mcp.json:/home/agent/.omp/agent/mcp.json:ro
      # Claude Code config (read-only sources; entrypoint syncs them into ~/.claude/ on start)
      - ./config/claude/settings.json:/home/agent/.config/claude-settings.json:ro
      - ./config/claude/CLAUDE.md:/home/agent/.config/claude-CLAUDE.md:ro
      - ./config/claude/agents:/home/agent/.config/claude-agents:ro
      - ./config/claude/claude.json:/home/agent/.config/claude.json:ro
      # WeTTY xterm.js defaults (Dark+ palette). Served straight to the browser, so
      # edits need only a page reload — no rebuild. Overrides the build-time font patch.
      - ./config/wetty/xterm_defaults.js:/usr/local/lib/node_modules/wetty/build/client/xterm_config/xterm_defaults.js:ro
      # Claude Code session state (transcripts, checkpoints, etc.)
      - ./data/claude:/home/agent/.claude:rw
      # Your project workspace (read-write so tools can edit files)
      - ./workspace:/home/agent/workspace:rw
      - ./data/opencode:/home/agent/.local/share/opencode
      # NOT mounted directly to .local/share/opencode/auth.json — nesting a file mount inside
      # an already-mounted directory breaks on Docker Desktop for Mac (virtiofs "mountpoint is
      # outside of rootfs" error). Entrypoint symlinks it into place instead, keeping it live.
      - ./config/opencode/auth.json:/home/agent/.config/opencode-auth.json:ro
    # No network_mode: host — use bridge so container is isolated
    # but can still reach your inference server via host IP

  searxng:
    image: docker.io/searxng/searxng:2026.6.26-f8ffbf36f
    container_name: agentic-searxng
    restart: unless-stopped
    volumes:
      - ./config/searxng:/etc/searxng:ro
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080/
    depends_on:
      - valkey
    # No published ports — only reachable internally via http://searxng:8080
    ports:
      - "8080:8080/tcp"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE

  valkey:
    image: docker.io/valkey/valkey:9.1.0-trixie
    container_name: agentic-valkey
    command: valkey-server --save 30 1 --loglevel warning
    restart: unless-stopped
    volumes:
      - valkey-data:/data

  # reasoning-normalizer — splits DeepSeek's fused reasoning+content delta that makes Claude Code
  # abort with "Content block is not a thinking block"; byte-for-byte no-op for non-fusing brains
  # (e.g. Qwen). Full story: ideas/deepseek-thinking-block-bug.md.
  reasoning-normalizer:
    image: node:22-alpine@sha256:16e22a550f3863206a3f701448c45f7912c6896a62de43add43bb9c86130c3e2
    container_name: agentic-reasoning-normalizer
    environment:
      VLLM_UPSTREAM: ${MODEL_URL:-http://10.0.0.55:8888/v1}   # the REAL brain vLLM; only host:port are used
      NORMALIZER_PORT: "4002"
      UPSTREAM_TIMEOUT_MS: "3600000"                          # 60m idle read timeout — matches the rest of the chain (see litellm request_timeout)
    extra_hosts:
      - "host.docker.internal:host-gateway"                   # covers MODEL_URL pointing at a host-run vLLM
    volumes:
      - ./scripts/reasoning-normalizer.js:/reasoning-normalizer.js:ro
    command: ["node", "/reasoning-normalizer.js"]
    # No published ports — only litellm reaches it, over the internal docker network.
    init: true                                    # tini as PID 1 — reaps node cleanly
    restart: unless-stopped
    read_only: true                               # pure proxy, writes nothing to disk
    user: "1000:1000"                             # node:alpine's built-in non-root 'node' user
    security_opt:
      - no-new-privileges:true                    # no privilege escalation
    cap_drop:
      - ALL                                       # drop every Linux capability
    pids_limit: 64                                # cap fork bombs
    mem_limit: 128m                               # tiny proxy — hard ceiling

  # headroom — OPTIONAL context-compression sidecar on the brain path (issue #11), off by default;
  # enable via .env.example. Rationale, config trade-offs and gates: ideas/headroom-spike-results.md.
  headroom:
    build:
      context: ./headroom
    image: agentic-headroom
    container_name: agentic-headroom
    profiles: ["headroom"]
    depends_on:
      - reasoning-normalizer                      # its upstream — brain traffic continues through it
    environment:
      OPENAI_TARGET_API_URL: http://agentic-reasoning-normalizer:4002   # forward to the normalizer, not vLLM directly
      HEADROOM_NO_CCR: "1"                        # no retrieval markers, no injected headroom_retrieve tool
      HEADROOM_DISABLE_KOMPRESS: "1"              # rules-only even if an ML extra sneaks into the image
      HEADROOM_STATELESS: "true"                  # no filesystem writes — required for read_only below
      HEADROOM_UPDATE_CHECK: "off"                # no PyPI phone-home
      HEADROOM_TELEMETRY: "off"
      HEADROOM_NO_SUBSCRIPTION_TRACKING: "1"      # we have no Anthropic subscription to poll
      HEADROOM_REQUEST_TIMEOUT: "3600"            # 60m — matches the rest of the timeout chain
      HEADROOM_MODE: token                        # cache mode froze all turns (zero compression); token mode may rewrite prior turns
    # Every flag is load-bearing and --intercept-tool-results must stay OFF (it deletes code
    # bodies); rationale + measurements in ideas/headroom-spike-results.md.
    command: ["headroom", "proxy", "--host", "0.0.0.0", "--port", "8787",
              "--no-rate-limit", "--no-cache", "--no-ccr", "--stateless"]
    # No published ports — only litellm reaches it, over the internal docker network.
    init: true
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp                                      # python/uvicorn scratch despite --stateless
      - /home/headroom/.cache                     # HF tokenizer cache — read-only FS otherwise makes every request re-attempt the download
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256                               # uvicorn worker + threadpools
    mem_limit: 1g                                 # rules-only proxy; generous headroom for big payload buffers

  litellm:
    image: ghcr.io/berriai/litellm:v1.92.0        # latest stable as of 2026-07-16; post-attack (1.82.7/1.82.8 were the compromised PyPI versions)
    # >=1.90.0 required: older /v1/messages streaming drops each block's first token (BerriAI/litellm#30014)
    container_name: agentic-litellm
    depends_on:
      - reasoning-normalizer                      # brain path routes through it (no-op unless the brain fuses reasoning+content)
    environment:
      <<: *model-env
      # Send the brain path through the reasoning-normalizer above so the default DeepSeek brain is
      # covered. This is a NO-OP for a brain that doesn't fuse reasoning+content deltas, so it's safe
      # to leave regardless of which model the brain is; to bypass it, set MODEL_URL back to your
      # vLLM. Only MODEL_URL is overridden — VISION_MODEL_URL stays direct (the vision model doesn't
      # fuse). The sandbox's own MODEL_URL (for opencode/omp, which talk to vLLM directly) is untouched.
      # LITELLM_BRAIN_URL: hook for the optional headroom sidecar (issue #11), see .env.example.
      MODEL_URL: ${LITELLM_BRAIN_URL:-http://agentic-reasoning-normalizer:4002/v1}
      LITELLM_LOG: INFO                           # full request/response logging with DEBUG, less verbose with INFO, WARNING, ERROR, CRITICAL
      LITELLM_FORCE_CHAT_COMPLETION: "true"       # force /v1/chat/completions
      LITELLM_USE_RESPONSES_API: "false"          # Disable responses API path entirely
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # No published ports — the sandbox reaches this proxy over the internal docker network
    # (agentic-litellm:4000). Uncomment below only to debug the Anthropic→vLLM translation from the host.
    # ports:
    #   - "4000:4000/tcp"
    volumes:
      - ./config/litellm-config.yaml:/app/config.template.yaml:ro
    # The stock litellm image can't expand env vars inside model_list model
    # names, so a small sh wrapper renders the __PLACEHOLDER__ template first.
    # Vision vars default to the primary model when unset (single-model setup).
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        export VISION_MODEL_ID="$${VISION_MODEL_ID:-$$MODEL_ID}"
        VISION_MODEL_URL="$${VISION_MODEL_URL:-$$MODEL_URL}" &&
        sed -e "s|__MODEL_ID__|$$MODEL_ID|g"
        -e "s|__MODEL_VISION__|$$MODEL_VISION|g"
        -e "s|__VISION_MODEL_ID__|$$VISION_MODEL_ID|g"
        /app/config.template.yaml > /tmp/litellm-config.yaml &&
        exec litellm --config /tmp/litellm-config.yaml --port 4000 --host 0.0.0.0
    restart: unless-stopped

volumes:
  valkey-data:
