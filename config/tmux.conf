# window-size latest: the most recently active client defines the size —
# desktop stays full-width while a phone peeks in (screen clamped to smallest).
set -g window-size latest
# Native OSC 52: tmux forwards clipboard copies to the outer terminal (WeTTY),
# removing screen's 768-byte DCS limit. The override teaches tmux that the
# outer xterm-256color supports OSC 52 (its terminfo lacks the Ms capability).
set -g set-clipboard on
set -as terminal-overrides ',xterm*:Ms=\E]52;%p1%s;%p2%s\007'
set -g history-limit 10000

# xterm-256color's terminfo has no RGB cap, so tmux would quantize 24-bit colour
# down to the 256 palette — xterm.js does support truecolor, so tell tmux that.
set -as terminal-features ',xterm*:RGB'

# Status bar in Dark+ (config/wetty/xterm_defaults.js). Bar background matches the
# terminal so it recedes like Windows Terminal, which has no bar at all.
set -g status-style 'bg=#1e1e1e,fg=#cccccc'
set -g window-status-current-style 'fg=#3b8eea,bold'
set -g window-status-style 'fg=#666666'
set -g pane-active-border-style 'fg=#2472c8'
set -g pane-border-style 'fg=#666666'
set -g message-style 'bg=#2472c8,fg=#e5e5e5'
