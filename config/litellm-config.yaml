# LiteLLM proxy config TEMPLATE — rendered at container start by the sh wrapper
# in compose.yml, which replaces the __PLACEHOLDER__ tokens from the MODEL_* /
# VISION_MODEL_* environment (see the x-model-env block in compose.yml).
# api_base values use LiteLLM's native os.environ/ resolution and need no sed.
model_list:
  # Brain — the primary model under its canonical role name.
  - model_name: brain
    litellm_params:
      model: hosted_vllm/__MODEL_ID__
      api_base: "os.environ/MODEL_URL"
      api_key: dummy
    model_info:
      supports_vision: __MODEL_VISION__

  # Model-class aliases — Claude Code's slots send these names (mapped by the
  # ANTHROPIC_DEFAULT_* env vars in config/claude/settings.json), so claude-shim
  # can log which class made each request. opus/fable → brain backend,
  # haiku/sonnet → vision backend. claude-shim.js's VISION_SIDE set must match
  # this split.
  - model_name: fable
    litellm_params:
      model: hosted_vllm/__MODEL_ID__
      api_base: "os.environ/MODEL_URL"
      api_key: dummy
    model_info:
      supports_vision: __MODEL_VISION__

  - model_name: opus
    litellm_params:
      model: hosted_vllm/__MODEL_ID__
      api_base: "os.environ/MODEL_URL"
      api_key: dummy
    model_info:
      supports_vision: __MODEL_VISION__

  - model_name: sonnet
    litellm_params:
      model: hosted_vllm/__VISION_MODEL_ID__
      api_base: "os.environ/VISION_MODEL_URL"
      api_key: dummy
    model_info:
      supports_vision: true

  - model_name: haiku
    litellm_params:
      model: hosted_vllm/__VISION_MODEL_ID__
      api_base: "os.environ/VISION_MODEL_URL"
      api_key: dummy
    model_info:
      supports_vision: true

  # Compat net — stock Anthropic ids, kept in case any Claude Code code path
  # requests a hardcoded id without consulting the ANTHROPIC_DEFAULT_* env
  # vars. Same backend as `brain`.
  - model_name: claude-sonnet-4-5
    litellm_params:
      model: hosted_vllm/__MODEL_ID__
      api_base: "os.environ/MODEL_URL"
      api_key: dummy
    model_info:
      supports_vision: __MODEL_VISION__

  - model_name: claude-haiku-4-5
    litellm_params:
      model: hosted_vllm/__MODEL_ID__
      api_base: "os.environ/MODEL_URL"
      api_key: dummy
    model_info:
      supports_vision: __MODEL_VISION__

  # Vision model — target for image-bearing requests when the primary is
  # text-only (MODEL_VISION=false): claude-shim.js rewrites those requests to
  # this model name. Also directly selectable in Claude Code via `/model vision`.
  # Defaults to the primary model when VISION_MODEL_* is unset.
  - model_name: vision
    litellm_params:
      model: hosted_vllm/__VISION_MODEL_ID__
      api_base: "os.environ/VISION_MODEL_URL"
      api_key: dummy
    model_info:
      supports_vision: true

litellm_settings:
  drop_params: true                 # silently drop unsupported params (thinking, effort, etc.) instead of erroring
  use_responses_api: false
  # Force the Anthropic messages endpoint to translate to chat/completions
  forward_client_headers_to_llm_api: false
  # Upstream read timeout. Default 600s kills a long single generation: on a slow box a maxed
  # reasoning+content turn (8k think + 16k content) at ~44 tok/s is ~9 min, so 600s cuts it off
  # mid-stream ("Timeout on reading data from socket"). 1800s matches the rest of the timeout chain
  # (claude-shim + reasoning-normalizer UPSTREAM_TIMEOUT_MS, Claude Code API_TIMEOUT_MS).
  request_timeout: 3600
